---
# Playbook principal — associa a instância EC2 à role web.
# O banco de dados é um RDS gerenciado pelo Terraform — não há role de banco.
#
# O grupo tag_Name_InstanciaNginx é gerado automaticamente pelo inventário
# dinâmico a partir da tag da instância criada pelo Terraform.
#
# Execução:
#   ansible-playbook -i aws_ec2.yaml playbook.yml

- hosts: tag_Name_InstanciaNginx
  roles:
    - web
